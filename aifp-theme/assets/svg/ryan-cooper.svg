  <path d="M 70 66 Q 67 74 69 76 Q 70 77 71 76 Q 73 74 70 66" fill="none" stroke="#d4a07a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Full beard — dark, thin, stays inside jawline -->
  <!-- Main beard shape — cheeks + jaw + chin, pulled inward from face edge -->
  <path d="M 52 76 Q 51 80 51 85 Q 52 89 57 92 Q 63 94 70 95 Q 77 94 83 92 Q 88 89 89 85 Q 89 80 88 76 Q 86 74 84 76 Q 82 78 82 80 L 82 82 Q 78 79 70 79 Q 62 79 58 82 L 58 80 Q 58 78 56 76 Q 54 74 52 76 Z" fill="#3d2e1e"/>
