  <path d="M 59 82 Q 64 88 70 89 Q 76 88 81 82" stroke="#a07050" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M 61 83 Q 65 86.5 70 87 Q 75 86.5 79 83" fill="#ffffff"/>
  <path d="M 61 85 Q 70 91 79 85" fill="none" stroke="#a07050" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
<!-- Jawline -->
  <path d="M 42 70 Q 45 87 56 94" fill="none" stroke="#c8a880" stroke-width="0.7" opacity="0.25"/>
  <path d="M 98 70 Q 95 87 84 94" fill="none" stroke="#c8a880" stroke-width="0.7" opacity="0.25"/>
