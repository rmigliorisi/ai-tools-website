  <path d="M 58 79 Q 62 77 66 78 Q 68 78.5 70 79 Q 72 78.5 74 78 Q 78 77 82 79 L 82 81 Q 78 79.5 74 80 Q 72 80.5 70 81 Q 68 80.5 66 80 Q 62 79.5 58 81 Z" fill="#2a1a0e"/>
