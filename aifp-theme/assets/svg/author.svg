  <path d="M 79 54.5 Q 86 52.5 92 55" stroke="#1c1612" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Eyes — no glasses, warm brown -->
  <ellipse cx="54" cy="62" rx="5" ry="3.5" fill="#ffffff"/>
  <ellipse cx="86" cy="62" rx="5" ry="3.5" fill="#ffffff"/>
  <circle cx="54" cy="62.5" r="3" fill="#3b2816"/>
  <circle cx="86" cy="62.5" r="3" fill="#3b2816"/>
  <circle cx="53" cy="61" r="1.5" fill="#000000"/>
  <circle cx="85" cy="61" r="1.5" fill="#000000"/>
  <circle cx="55" cy="61.2" r="0.9" fill="#ffffff" opacity="0.6"/>
  <circle cx="87" cy="61.2" r="0.9" fill="#ffffff" opacity="0.6"/>
  <!-- Nose -->
  <path d="M 70 68 Q 67 76 69 78 Q 70 79 71 78 Q 73 76 70 68" fill="none" stroke="#c8905e" stroke-width="1.3" stroke-linecap="round"/>
