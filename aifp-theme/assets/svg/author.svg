  <g opacity="0.2" fill="#8a7060">
    <circle cx="60" cy="79" r="0.5"/><circle cx="63" cy="80" r="0.4"/>
    <circle cx="77" cy="80" r="0.4"/><circle cx="80" cy="79" r="0.5"/>
    <circle cx="65" cy="78" r="0.3"/><circle cx="75" cy="78" r="0.3"/>
  </g>
  <!-- Jawline -->
  <path d="M 42 70 Q 45 87 56 94" fill="none" stroke="#d0a880" stroke-width="0.7" opacity="0.25"/>
  <path d="M 98 70 Q 95 87 84 94" fill="none" stroke="#d0a880" stroke-width="0.7" opacity="0.25"/>
