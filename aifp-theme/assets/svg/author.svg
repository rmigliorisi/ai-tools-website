  <path d="M 42 68 Q 40 58 41 48 Q 43 28 70 22 Q 97 28 99 48 Q 100 58 98 68 L 97 64 Q 97 56 94 46 Q 93 35 70 31 Q 47 35 46 46 Q 43 56 43 64 Z" fill="#1c1612"/>
