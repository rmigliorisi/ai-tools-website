  <path d="M 38 62 Q 36.5 66 38 70" fill="none" stroke="#d4a07a" stroke-width="1" stroke-linecap="round"/>
  <ellipse cx="100" cy="66" rx="5" ry="6.5" fill="#edc5a3"/>
  <path d="M 102 62 Q 103.5 66 102 70" fill="none" stroke="#d4a07a" stroke-width="1" stroke-linecap="round"/>
