<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg" width="140" height="140">
  <!-- Background -->
  <circle cx="70" cy="70" r="70" fill="#e2ecf4"/>
  <!-- Shoulders / jacket -->
  <path d="M 0 140 Q 5 105 28 96 Q 45 89 70 91 Q 95 89 112 96 Q 135 105 140 140 Z" fill="#1e293b"/>
  <!-- Shirt / collar open -->
  <path d="M 58 93 L 70 112 L 82 93 Q 70 88 58 93 Z" fill="#f8fafc"/>
  <!-- Neck -->
  <rect x="61" y="82" width="18" height="16" rx="5" fill="#e8b090"/>
  <!-- Head -->
  <ellipse cx="70" cy="64" rx="30" ry="33" fill="#e8b090"/>
  <!-- Hair — short, dark, close-cropped -->
  <path d="M 40 58 Q 40 28 70 26 Q 100 28 100 58 Q 98 36 70 33 Q 42 36 40 58 Z" fill="#2c1f14"/>
  <!-- Slight side hair -->
  <path d="M 40 58 Q 39 50 41 44 Q 39 52 41 62 Z" fill="#2c1f14"/>
  <path d="M 100 58 Q 101 50 99 44 Q 101 52 99 62 Z" fill="#2c1f14"/>
  <!-- Ears -->
  <ellipse cx="40" cy="67" rx="5.5" ry="7" fill="#d4956a"/>
  <ellipse cx="100" cy="67" rx="5.5" ry="7" fill="#d4956a"/>
  <!-- Glasses left frame -->
  <rect x="44" y="58" width="20" height="14" rx="3.5" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Glasses right frame -->
  <rect x="76" y="58" width="20" height="14" rx="3.5" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Nose bridge -->
  <line x1="64" y1="64" x2="76" y2="64" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Temples -->
  <line x1="36" y1="64" x2="44" y2="64" stroke="#1a1a2e" stroke-width="1.8"/>
  <line x1="96" y1="64" x2="104" y2="64" stroke="#1a1a2e" stroke-width="1.8"/>
  <!-- Eyes inside frames -->
  <circle cx="54" cy="65" r="4" fill="#3d5a80"/>
  <circle cx="86" cy="65" r="4" fill="#3d5a80"/>
  <circle cx="55.5" cy="63.5" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="87.5" cy="63.5" r="1.2" fill="#ffffff" opacity="0.7"/>
  <!-- Nose -->
  <path d="M 70 73 Q 67 78 69 80 Q 70 81 71 80 Q 73 78 70 73" fill="none" stroke="#c07850" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Smile — gentle, closed -->
  <path d="M 61 87 Q 70 93 79 87" stroke="#b07040" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
