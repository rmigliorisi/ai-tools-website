# ─────────────────────────────────────────────────────────────────────────────
# AI Tools for Pros — Theme QA Check
#
# Runs the same QA checks as wpcom.yml but WITHOUT deploying.
# Primary purpose: catch problems on pull requests before code reaches main.
#
# Triggers:
#   • Push to `main` that touches aifp-theme/ files
#   • Pull requests targeting `main` that touch aifp-theme/ files
#
# QA checks:
#   1. PHP syntax check    — parse/fatal errors fail the check
#   2. [VERIFY DETAILS]    — content flags fail the check
#   3. Debug code          — var_dump/print_r/die() fail the check
#   4. Required files      — critical theme assets must exist
#
# Deployment is handled by wpcom.yml + WordPress.com GitHub Deployments.
# ─────────────────────────────────────────────────────────────────────────────

name: Theme QA

on:
  push:
    branches: [main]
    paths:
      - 'aifp-theme/**'
  pull_request:
    branches: [main]
    paths:
      - 'aifp-theme/**'

jobs:
  qa:
    name: "QA — Syntax, Flags & Safety Checks"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. PHP syntax check ────────────────────────────────────────────────
      - name: PHP syntax check
        run: |
          echo "🔍 Running PHP syntax check..."
          ERRORS=0
          while IFS= read -r -d '' file; do
            result=$(php -l "$file" 2>&1)
            if echo "$result" | grep -qE "Parse error|Fatal error"; then
              echo "❌ $file"
              echo "   $result"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find aifp-theme -name "*.php" -print0)

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS PHP file(s) failed syntax check. Fix before merging."
            exit 1
          fi
          echo "✅ All PHP files passed syntax check."

      # ── 2. [VERIFY DETAILS] flag scan ─────────────────────────────────────
      - name: Check for [VERIFY DETAILS] flags
        run: |
          echo "🔍 Scanning for [VERIFY DETAILS] flags..."
          FOUND=$(grep -rn "\[VERIFY DETAILS\]" aifp-theme/ --include="*.php" || true)

          if [ -n "$FOUND" ]; then
            echo ""
            echo "$FOUND"
            echo ""
            echo "❌ [VERIFY DETAILS] flags found in theme files. Resolve them before merging."
            exit 1
          fi
          echo "✅ No [VERIFY DETAILS] flags found."

      # ── 3. Debug code check ───────────────────────────────────────────────
      - name: Check for debug code leftovers
        run: |
          echo "🔍 Scanning for debug code..."
          FOUND=$(grep -rn "var_dump\|print_r\|var_export\b" aifp-theme/ --include="*.php" || true)
          DEBUG_DIE=$(grep -rn "^\s*die(\|^\s*exit(" aifp-theme/ --include="*.php" | grep -v "ABSPATH\|defined(" || true)

          if [ -n "$FOUND" ] || [ -n "$DEBUG_DIE" ]; then
            echo ""
            [ -n "$FOUND" ] && echo "$FOUND"
            [ -n "$DEBUG_DIE" ] && echo "$DEBUG_DIE"
            echo ""
            echo "❌ Debug code found. Remove before merging."
            exit 1
          fi
          echo "✅ No debug code found."

      # ── 4. Required files check ───────────────────────────────────────────
      - name: Check required theme files exist
        run: |
          echo "🔍 Checking required theme files..."
          MISSING=0
          REQUIRED=(
            "aifp-theme/functions.php"
            "aifp-theme/style.css"
            "aifp-theme/footer.php"
            "aifp-theme/header.php"
            "aifp-theme/inc/cpt.php"
            "aifp-theme/inc/helpers.php"
            "aifp-theme/inc/json-ld.php"
            "aifp-theme/assets/css/site.css"
            "aifp-theme/assets/css/components.css"
            "aifp-theme/assets/js/site.js"
            "aifp-theme/page-templates/page-contact.php"
          )

          for file in "${REQUIRED[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "❌ $MISSING required file(s) missing."
            exit 1
          fi
          echo "✅ All required theme files present."
