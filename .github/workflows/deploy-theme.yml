# ─────────────────────────────────────────────────────────────────────────────
# AI Tools for Pros — Theme QA Check
#
# Triggers:
#   • Any push to `main` that touches aifp-theme/ files
#   • Any pull request targeting `main` that touches aifp-theme/ files
#
# What it does:
#   1. PHP syntax check  — fails if any .php file has a parse/fatal error
#   2. Flag scan         — fails if any [VERIFY DETAILS] flags remain in PHP files
#
# Deployment is handled by WordPress.com's native GitHub Deployments.
# This workflow only acts as a quality gate before code goes live.
# ─────────────────────────────────────────────────────────────────────────────

name: Theme QA

on:
  push:
    branches: [main]
    paths:
      - 'aifp-theme/**'
  pull_request:
    branches: [main]
    paths:
      - 'aifp-theme/**'

jobs:
  qa:
    name: "QA — Syntax & Flag Checks"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: PHP syntax check (all .php files in aifp-theme)
        run: |
          echo "🔍 Running PHP syntax check..."
          ERRORS=0
          while IFS= read -r -d '' file; do
            result=$(php -l "$file" 2>&1)
            if echo "$result" | grep -qE "Parse error|Fatal error"; then
              echo "❌ $file"
              echo "   $result"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find aifp-theme -name "*.php" -print0)

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS PHP file(s) failed syntax check. Fix before merging."
            exit 1
          fi

          echo "✅ All PHP files passed syntax check."

      - name: Check for [VERIFY DETAILS] flags in theme PHP files
        run: |
          echo "🔍 Scanning for [VERIFY DETAILS] flags..."
          FOUND=$(grep -rn "\[VERIFY DETAILS\]" aifp-theme/ --include="*.php" || true)

          if [ -n "$FOUND" ]; then
            echo ""
            echo "$FOUND"
            echo ""
            echo "❌ [VERIFY DETAILS] flags found in theme files. Resolve them before merging."
            exit 1
          fi

          echo "✅ No [VERIFY DETAILS] flags found."
